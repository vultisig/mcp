name: Integration Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: integration-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vultisig
          POSTGRES_PASSWORD: vultisig
          POSTGRES_DB: vultisig-agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vultisig -d vultisig-agent"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_DSN: postgres://vultisig:vultisig@localhost:5432/vultisig-agent?sslmode=disable
      REDIS_URI: redis://localhost:6379
      JWT_SECRET: integration-test-secret-key-not-for-prod
      AI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_MODEL: anthropic/claude-sonnet-4
      AI_SUMMARY_MODEL: anthropic/claude-haiku-4.5
      MCP_SERVER_URL: http://localhost:8888
      VERIFIER_URL: ""
      SERVER_PORT: "9998"

    steps:
      # ── Checkout repos ──
      - name: Checkout MCP (PR branch)
        uses: actions/checkout@v4
        with:
          path: mcp

      - name: Checkout agent-backend
        uses: actions/checkout@v4
        with:
          repository: vultisig/agent-backend
          ref: fix/agent-tool-calls
          token: ${{ secrets.GITHUB_TOKEN }}
          path: agent-backend

      - name: Checkout vultisig-sdk
        uses: actions/checkout@v4
        with:
          repository: vultisig/vultisig-sdk
          ref: feature/agent-chat
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vultisig-sdk

      # ── Setup Go ──
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: |
            mcp/go.sum
            agent-backend/go.sum

      # ── Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Build MCP server from PR branch ──
      - name: Build MCP server
        working-directory: mcp
        run: CGO_ENABLED=0 go build -o ../mcp-server ./cmd/mcp-server/

      # ── Start MCP server ──
      - name: Start MCP server
        run: |
          ./mcp-server -http :8888 > /tmp/mcp-server.log 2>&1 &
          echo "MCP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8888/skills > /dev/null 2>&1; then
              echo "MCP server ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::MCP server failed to start"
              cat /tmp/mcp-server.log
              exit 1
            fi
            sleep 1
          done

      # ── Verify skills are served ──
      - name: Verify MCP skills listing
        run: |
          SKILLS=$(curl -sf http://localhost:8888/skills)
          echo "Skills: $SKILLS"
          SKILL_COUNT=$(echo "$SKILLS" | jq length)
          echo "Skill count: $SKILL_COUNT"
          if [ "$SKILL_COUNT" -lt 1 ]; then
            echo "::error::No skills found in MCP listing"
            exit 1
          fi

      # ── Run agent-backend DB migrations ──
      - name: Run database migrations
        working-directory: agent-backend
        run: |
          go run -tags 'postgres' github.com/pressly/goose/v3/cmd/goose@latest \
            -dir internal/storage/postgres/migrations \
            postgres "$DATABASE_DSN" up

      # ── Build and start agent-backend ──
      - name: Build agent-backend
        working-directory: agent-backend
        run: go build -o ../agent-server ./cmd/server/

      - name: Start agent-backend
        run: |
          ./agent-server > /tmp/agent-backend.log 2>&1 &
          echo "AGENT_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9998/healthz > /dev/null 2>&1; then
              echo "Agent-backend ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Agent-backend failed to start"
              cat /tmp/agent-backend.log
              exit 1
            fi
            sleep 1
          done

      # ── Verify agent-backend discovered MCP tools and skills ──
      - name: Verify MCP integration with agent-backend
        run: |
          echo "=== Agent Backend Logs ==="
          cat /tmp/agent-backend.log

          TOOL_COUNT=$(grep -o '"mcp_tool_count":[0-9]*' /tmp/agent-backend.log | head -1 | grep -o '[0-9]*')
          echo "MCP tools discovered: $TOOL_COUNT"
          if [ -z "$TOOL_COUNT" ] || [ "$TOOL_COUNT" -lt 1 ]; then
            echo "::error::Agent-backend did not discover any MCP tools"
            exit 1
          fi

          SKILL_COUNT=$(grep -o '"skill_count":[0-9]*' /tmp/agent-backend.log | head -1 | grep -o '[0-9]*')
          echo "MCP skills discovered: $SKILL_COUNT"
          if [ -z "$SKILL_COUNT" ] || [ "$SKILL_COUNT" -lt 1 ]; then
            echo "::error::Agent-backend did not discover any MCP skills"
            exit 1
          fi

          if grep -q 'weth-wrap-unwrap' /tmp/agent-backend.log; then
            echo "✓ weth-wrap-unwrap skill discovered by agent-backend"
          else
            echo "::warning::weth-wrap-unwrap skill not found in agent-backend logs"
          fi

      # ── Setup vultisig-sdk CLI ──
      - name: Install vultisig-sdk dependencies
        working-directory: vultisig-sdk
        run: yarn install --frozen-lockfile

      - name: Build vultisig-sdk
        working-directory: vultisig-sdk
        run: yarn build:all

      # ── Setup test vault ──
      - name: Setup test vault
        run: |
          mkdir -p ~/.vultisig
          cp mcp/testdata/test-vault.json ~/.vultisig/vault:023118028f9e87a0a6a10e84e26d2d8147ea8cb0d00aaf0d91b2ca512fba033120.json
          echo '{"activeVaultId":"023118028f9e87a0a6a10e84e26d2d8147ea8cb0d00aaf0d91b2ca512fba033120"}' > ~/.vultisig/activeVaultId.json

      # ── Install and configure opencode ──
      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure opencode
        run: |
          mkdir -p ~/.local/share/opencode
          echo '${{ secrets.OPENCODE_AUTH }}' > ~/.local/share/opencode/auth.json
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.json <<'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "permission": {
              "*": {
                "*": "allow"
              }
            }
          }
          EOF

      # ── Discover what changed in this PR ──
      - name: Discover PR changes
        working-directory: mcp
        run: |
          # Get the diff of new/changed skills and tools vs main
          git fetch origin main --depth=50 2>/dev/null || true
          {
            echo "=== New/changed skill files ==="
            git diff origin/main...HEAD --name-status -- 'internal/skills/files/*.md'
            echo ""
            echo "=== New/changed tool files ==="
            git diff origin/main...HEAD --name-status -- 'internal/tools/*.go' 'internal/protocols/**/*.go'
            echo ""
            echo "=== Skill contents (new/modified only) ==="
            for f in $(git diff origin/main...HEAD --name-only --diff-filter=AM -- 'internal/skills/files/*.md'); do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done
            echo ""
            echo "=== Available MCP skills ==="
            curl -sf http://localhost:8888/skills | jq -r '.[].name'
          } > /tmp/pr-changes.txt
          cat /tmp/pr-changes.txt

      # ── Run integration test via opencode ──
      - name: Run integration test with opencode
        working-directory: vultisig-sdk
        env:
          VAULT_PASSWORD: ${{ secrets.TEST_VAULT_PASSWORD }}
        run: |
          export VAULT_PASSWORD
          opencode run --model opencode/minimax-m2.5 "$(cat <<'PROMPT'
          You are an integration test agent. Your job is to exercise new MCP skills and tools introduced in a pull request by chatting with a Vultisig AI agent through the CLI.

          ## Environment

          The full stack is already running:
          - MCP server at localhost:8888 (skills/tools)
          - agent-backend at localhost:9998 (AI agent)
          - Test vault "ci_test" is configured in ~/.vultisig/
          - The vault password is in the $VAULT_PASSWORD environment variable
          - The test vault has a small amount of ETH on Ethereum mainnet

          ## Step 1: Discover what to test

          Read the file /tmp/pr-changes.txt — it contains the git diff showing which skills and tools were added or modified in this PR, plus the full content of any new skill files.

          From this, identify:
          - New skills (markdown files in internal/skills/files/)
          - New or changed tools (Go files in internal/tools/)
          - What actions/workflows these skills teach

          Design a concrete integration test that exercises the new functionality end-to-end. For example:
          - If a new skill teaches how to wrap ETH, ask the agent to wrap a tiny amount (0.0001 ETH)
          - If a new tool queries balances, ask the agent to check balances
          - If a skill involves contract interaction, ask the agent to perform it

          ## Step 2: Chat with the agent

          Start the vultisig CLI agent in pipe mode:

              npx tsx clients/cli/src/index.ts agent --vault ci_test --password "$VAULT_PASSWORD" --backend-url http://localhost:9998 --via-agent

          This spawns a long-running process communicating via NDJSON on stdin/stdout:
          - Wait for a line containing "type":"ready" (60s timeout)
          - Send messages: {"type":"message","content":"your message here"}
          - Read lines until "type":"done" for each turn
          - "type":"text_delta" has streaming text in "delta"
          - "type":"assistant" has full response in "content"
          - "type":"tool_result" has tool call results

          Handle these automatically:
          - "type":"error" with "message":"PASSWORD_REQUIRED" → send {"type":"password","password":"$VAULT_PASSWORD_PLACEHOLDER"}
            (use the actual value of $VAULT_PASSWORD from the environment)
          - "type":"error" with message starting "CONFIRMATION_REQUIRED" → send {"type":"confirm","confirmed":true}

          ## Step 3: Evaluate

          The test passes if the agent successfully executes the workflow from the new skill:
          - Tool calls match the expected flow (e.g., abi_encode → evm_tx_info → build_evm_tx for EVM skills)
          - Transactions are signed and broadcast (tx_hash returned)
          - No unrecoverable errors

          Allow up to 10 turns of back-and-forth. If the agent asks questions, approve and tell it to proceed.

          ## Output

          Print exactly one of:
          - INTEGRATION_TEST: PASS — with a brief summary of what was tested and the tx hash if any
          - INTEGRATION_TEST: FAIL — with explanation of what went wrong

          Important:
          - Use small amounts (0.0001 ETH or less) to minimize cost
          - Use timeouts: 60s for ready, 3 min per agent turn, 10 min total
          - The CLI process must stay alive between messages
          PROMPT
          )" 2>&1 | tee /tmp/opencode-output.log

          # Check the output for PASS/FAIL
          if grep -q "INTEGRATION_TEST: PASS" /tmp/opencode-output.log; then
            echo "✓ Integration test passed"
          elif grep -q "INTEGRATION_TEST: FAIL" /tmp/opencode-output.log; then
            echo "::error::Integration test failed"
            exit 1
          else
            echo "::warning::Could not determine test result from opencode output"
          fi

      # ── Cleanup ──
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== MCP Server Log ==="
          cat /tmp/mcp-server.log || true
          echo "=== Agent Backend Log ==="
          cat /tmp/agent-backend.log || true
          echo "=== OpenCode Output ==="
          cat /tmp/opencode-output.log 2>/dev/null || echo "No opencode output"

      - name: Cleanup
        if: always()
        run: |
          [ -n "$AGENT_PID" ] && kill "$AGENT_PID" 2>/dev/null || true
          [ -n "$MCP_PID" ] && kill "$MCP_PID" 2>/dev/null || true
